---
- name: Installation de node_exporter sur toutes les VMs
  hosts: all
  become: true
  vars:
    node_exporter_version: "1.8.1"

  tasks:
    - name: Téléchargement de node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        validate_certs: no

    - name: Extraction de node_exporter
      unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp/"
        remote_src: yes

    - name: Copie du binaire
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: "/usr/local/bin/node_exporter"
        mode: "0755"
        remote_src: yes

    - name: Création du service node_exporter
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target
          [Service]
          User=nobody
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target

    - name: Démarrage de node_exporter
      systemd:
        name: node_exporter
        daemon_reload: yes
        enabled: yes
        state: started

- name: Installation de Prometheus et Grafana sur monitoring-node
  hosts: monitoring
  become: true
  vars:
    prometheus_version: "2.52.0"

  tasks:
    - name: Téléchargement de Prometheus
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: "/tmp/prometheus.tar.gz"

    - name: Extraction de Prometheus
      unarchive:
        src: "/tmp/prometheus.tar.gz"
        dest: "/tmp/"
        remote_src: yes

    - name: Création des répertoires Prometheus
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Copie des binaires Prometheus
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
        remote_src: yes
      loop:
        - prometheus
        - promtool

    - name: Configuration de Prometheus
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'k3s-node'
              static_configs:
                - targets: ['192.168.56.10:9100']
            - job_name: 'monitoring-node'
              static_configs:
                - targets: ['192.168.56.11:9100']

    - name: Création du service Prometheus
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          After=network.target
          [Service]
          ExecStart=/usr/local/bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/var/lib/prometheus
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target

    - name: Démarrage de Prometheus
      systemd:
        name: prometheus
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Installation des dépendances Grafana
      apt:
        name: [apt-transport-https, software-properties-common, wget]
        state: present
        update_cache: yes

    - name: Ajout clé GPG Grafana
      shell: wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor | tee /etc/apt/keyrings/grafana.gpg > /dev/null
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Ajout dépôt Grafana
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        state: present
        filename: grafana

    - name: Installation de Grafana
      apt:
        name: grafana
        state: present
        update_cache: yes

    - name: Démarrage de Grafana
      systemd:
        name: grafana-server
        enabled: yes
        state: started
