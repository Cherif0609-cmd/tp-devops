---
- name: Installation de k3s
  hosts: all
  become: true

  tasks:
    - name: Mise à jour apt
      apt:
        update_cache: yes

    - name: Installation de curl
      apt:
        name: curl
        state: present

    - name: Installation de k3s
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Démarrage du service k3s
      systemd:
        name: k3s
        enabled: yes
        state: started

    - name: Vérification des noeuds
      command: k3s kubectl get nodes
      register: result
      changed_when: false

    - name: Affichage des noeuds
      debug:
        msg: "{{ result.stdout_lines }}"