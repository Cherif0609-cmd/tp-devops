name: CI/CD - Lacets Connectes API

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion a Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build de l'image Docker
        run: docker build -t chrmahfzmane/lacets-connectes-api:${{ github.sha }} ./app

      - name: Push de l'image sur Docker Hub
        run: docker push chrmahfzmane/lacets-connectes-api:${{ github.sha }}

      - name: Mise a jour du tag dans le manifest
        run: sed -i "s|chrmahfzmane/lacets-connectes-api:latest|chrmahfzmane/lacets-connectes-api:${{ github.sha }}|g" k8s/06-api-deployment.yml

      - name: Deploiement sur Kubernetes
        run: kubectl apply -f k8s/ --validate=false --insecure-skip-tls-verify=true
